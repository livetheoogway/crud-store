name: Deployment to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "👷 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "☕ Set up java"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: "🔧 Compile"
        run: mvn compile

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: "👷 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "☕ Set up java"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          gpg-key-id: 5F74D2AB5E934F6C81C815C1E52415495EC603B0

      - name: "🗽 Publish package"
        run: mvn clean deploy -DskipTests -Prelease
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  tag_release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: "👷 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📎 Install xmllint"
        run: sudo apt-get install -y libxml2-utils

      - name: "📑 Setup release information"
        run: |
          pom_version=`xmllint --xpath '/*[local-name()="project"]/*[local-name()="version"]/text()' pom.xml`
          echo "POM_VERSION=$pom_version" >> $GITHUB_ENV

      - name: "🔎 Verify tag matches pom version"
        if: github.event_name == 'release'
        run: |
          tag="${{ github.event.release.tag_name }}"
          # allow both "1.3.0" and "v1.3.0" style tags
          if [ "$tag" != "$POM_VERSION" ] && [ "$tag" != "v$POM_VERSION" ]; then
            echo "::error::Release tag '$tag' does not match pom.xml version '$POM_VERSION'"
            exit 1
          fi

      - name: "✏️ Generate release notes"
        id: release-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$POM_VERSION"
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          fi
          # Use GitHub's native, PR-based release notes generator
          notes=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$tag" \
            --jq '.body')
          {
            echo "notes<<__NOTES_EOF__"
            echo "$notes"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: "📍 Create release (manual dispatch)"
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$POM_VERSION" \
            --title "v$POM_VERSION" \
            --notes "${{ steps.release-notes.outputs.notes }}"

      - name: "📝 Attach notes to existing release (release event)"
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.event.release.tag_name }}" \
            --notes "${{ steps.release-notes.outputs.notes }}"